spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/feebridge}
    username: ${DB_USERNAME:feebridge}
    password: ${DB_PASSWORD:feebridge}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
